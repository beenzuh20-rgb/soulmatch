<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulMatch</title>
    <style>
        body{
            margin:0;
            font-family:'Segoe UI',sans-serif;
            background:url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=1600&q=80');
            background-size:cover;
            background-position:center;
            color:white;
        }
        .overlay{
            background:rgba(0,0,0,0.65);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .glass{
            width:480px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.25);
            border-radius:28px;
            padding:35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        input, textarea, select{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:none;
            border-radius:12px;
            background:rgba(255,255,255,0.15);
            color:white;
        }
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:50px;
            background:linear-gradient(135deg,#ff416c,#ff4b2b);
            color:white;
            font-weight:bold;
            font-size:16px;
            cursor:pointer;
            transition:all .3s ease;
        }
        .report-btn, .block-btn {
            background: #cc0000 !important;
        }
        .match-card{
            background:rgba(255,255,255,.12);
            padding:18px;
            border-radius:20px;
            margin:15px 0;
        }
        .message-bubble{
            padding:10px 14px;
            border-radius:18px;
            margin:8px 0;
            max-width:85%;
        }
        .you { background:#ff4b2b; margin-left:auto; text-align:right; }
        .them { background:rgba(255,255,255,0.2); }
        button:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,75,110,.5); }
        a{color:white;text-decoration:none}
        img{ width:100%; border-radius:20px; object-fit:cover; }
        .footer-links { margin-top:20px; text-align:center; font-size:14px; }
        .footer-links a { margin:0 8px; color:#ddd; }
    </style>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulMatch</title>
    
    <!-- ✨ Add these 2 lines for the favicon -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    
    <!-- Your existing styles go here -->
    <style>
        /* ... your current CSS ... */
    </style>
</head>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
