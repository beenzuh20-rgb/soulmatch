{% extends "base.html" %}
{% block content %}
<div class="overlay">
    <div class="glass" style="text-align:center">
        <h2>✅ Reset Link Generated</h2>
        <p>A password reset link has been created for your account.</p>
        
        {% if reset_link %}
            <p><strong>Click the link below to reset your password:</strong></p>
            <p style="word-break: break-all;">
                <a href="{{ reset_link }}" target="_blank" style="color:#ff4b2b;">{{ reset_link }}</a>
            </p>
        {% endif %}
        
        <p><small>This link will expire in 1 hour.</small></p>
        
        <a href="/login"><button>Back to Login</button></a>
    </div>
</div>
{% endblock %}
