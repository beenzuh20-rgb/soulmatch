<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SoulMatch</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6a88, #ff99ac);
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #ff4d6d;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background: #ffe3ea;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Welcome to SoulMatch ❤️</h1>
        <p>Find real connections, chat, and match with people near you.</p>

        <a href="/login">Get Started</a>
    </div>

</body>
</html>
