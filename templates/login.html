<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SoulMatch</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(120deg, #ff6a88, #ff99ac);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff4d6d;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #e63e5c;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #ff4d6d;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Login ❤️</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="/signup">Create account</a>
</div>

</body>
</html>
