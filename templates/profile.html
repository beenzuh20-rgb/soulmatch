<!DOCTYPE html>
<html>
<head>
    <title>My Profile - SoulMatch</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 420px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 25px;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-bottom: 15px;
        }

        h2 {
            margin: 10px 0 5px;
            font-size: 24px;
        }

        .info {
            text-align: left;
            margin-top: 20px;
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 15px;
        }

        .info p {
            margin: 8px 0;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg,#ff416c,#ff4b2b);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.03);
        }

        .nav {
            margin-top: 15px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 8px;
            font-size: 14px;
        }

        .nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card">

    {% if user[7] %}
        <img src="{{ user[7] }}" class="avatar">
    {% else %}
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar">
    {% endif %}

    <h2>{{ user[1] }}</h2>
    <p>{{ user[3] }}</p>

    <div class="info">
        <p><b>Age:</b> {{ user[4] }}</p>
        <p><b>Gender:</b> {{ user[5] }}</p>
        <p><b>Location:</b> {{ user[6] }}</p>
        <p><b>Interests:</b> {{ user[8] }}</p>
    </div>

    <h3>Edit Profile</h3>

    <form method="POST" enctype="multipart/form-data">
        <input name="age" placeholder="Age">
        <input name="gender" placeholder="Gender">
        <input name="location" placeholder="Location">
        <input name="interests" placeholder="Interests">
        <textarea name="bio" placeholder="Bio"></textarea>
        <input type="file" name="photo">

        <button>Save Changes</button>
    </form>

    <div class="nav">
        <a href="/swipe">Swipe</a>
        <a href="/matches">Matches</a>
        <a href="/logout">Logout</a>
    </div>

</div>

</body>
</html>
