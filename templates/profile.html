<!DOCTYPE html>
<html>
<head>
<title>Tinder Profile UI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #1a1a2e, #16213e);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* swipe container */
.wrapper {
    width: 360px;
    position: relative;
}

/* main card */
.card {
    background: white;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
}

/* image */
.card img {
    width: 100%;
    height: 420px;
    object-fit: cover;
}

/* info section */
.info {
    padding: 15px;
}

.name {
    font-size: 22px;
    font-weight: bold;
}

.sub {
    color: gray;
    font-size: 14px;
    margin-top: 3px;
}

.bio {
    margin-top: 10px;
    font-size: 14px;
    color: #333;
}

/* swipe buttons */
.actions {
    display: flex;
    justify-content: space-around;
    padding: 15px;
}

.btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.1);
}

.pass {
    background: #ff4d4d;
    color: white;
}

.like {
    background: #4CAF50;
    color: white;
}

.super {
    background: #3498db;
    color: white;
}

/* edit form */
.edit {
    margin-top: 15px;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

input, textarea {
    width: 100%;
    margin-top: 6px;
    padding: 8px;
    border-radius: 10px;
    border: none;
}

button.save {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.links {
    text-align: center;
    margin-top: 10px;
}

.links a {
    color: white;
    text-decoration: none;
    margin: 0 8px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="card">

        {% if user[7] %}
            <img src="{{ user[7] }}">
        {% else %}
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        {% endif %}

        <div class="info">
            <div class="name">{{ user[1] }}, {{ user[4] }}</div>
            <div class="sub">{{ user[5] }} • {{ user[6] }}</div>
            <div class="bio">{{ user[3] }}</div>
        </div>

        <div class="actions">
            <button class="btn pass">✖</button>
            <button class="btn super">⭐</button>
            <button class="btn like">❤</button>
        </div>

    </div>

    <!-- EDIT PROFILE -->
    <div class="edit">
        <form method="POST" enctype="multipart/form-data">
            <input name="age" placeholder="Age">
            <input name="gender" placeholder="Gender">
            <input name="location" placeholder="Location">
            <input name="interests" placeholder="Interests">
            <textarea name="bio" placeholder="Bio"></textarea>
            <input type="file" name="photo">

            <button class="save">Save Profile</button>
        </form>
    </div>

    <div class="links">
        <a href="/swipe">Swipe</a>
        <a href="/matches">Matches</a>
        <a href="/logout">Logout</a>
    </div>

</div>

</body>
</html>
