{% extends "base.html" %}
{% block content %}
<div class="overlay">
    <div class="glass">
        <h2>Reset Your Password</h2>
        <form method="post">
            <input type="password" name="password" placeholder="New Password" required minlength="6">
            <button type="submit">Update Password</button>
        </form>
        <p><a href="/login">Back to Login</a></p>
    </div>
</div>
{% endblock %}
